version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planner-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=ixiflowerv2ray.settings
      - DJANGO_SECRET_KEY=your-secret-key-here
      - DB_NAME=planner_db
      - DB_USER=planner_user
      - DB_PASSWORD=planner_password
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - planner-network

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: telegram-bot
    environment:
      - DJANGO_SETTINGS_MODULE=ixiflowerv2ray.settings
      - PYTHONUNBUFFERED=1
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      - backend
      - db
    restart: unless-stopped
    networks:
      - planner-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:15-alpine
    container_name: planner-db
    environment:
      - POSTGRES_DB=planner_db
      - POSTGRES_USER=planner_user
      - POSTGRES_PASSWORD=planner_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - planner-network

  redis:
    image: redis:7-alpine
    container_name: planner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - planner-network

  nginx:
    image: nginx:alpine
    container_name: planner-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./media:/var/www/media
      - ./static:/var/www/static
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - planner-network

volumes:
  postgres_data:
  redis_data:

networks:
  planner-network:
    driver: bridge